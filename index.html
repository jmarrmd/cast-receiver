<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Home Energy Viz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #0F0F0F 0%, #050505 100%);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  #status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0.5;
    font-size: 24px;
  }
  #status .icon { font-size: 48px; margin-bottom: 16px; }
  #debug {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    max-width: 50%;
    word-wrap: break-word;
  }
</style>
</head>
<body>
<div id="status">
  <div class="icon">&#9889;</div>
  <div id="statusText">Initializing...</div>
</div>
<canvas id="c"></canvas>
<div id="debug"></div>

<!-- Google Cast Receiver SDK -->
<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

<script>
// ==========================================
// Home Energy Viz — Cast Custom Receiver
// ==========================================

const NAMESPACE = 'urn:x-cast:com.homeenergyviz';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let startTime = performance.now();

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Energy data — updated via Cast messages
let data = {
  solarPower: 0, homePower: 0, gridPower: 0,
  teslaPower: 0, hvacPower: 0,
  teslaCharging: false, teslaPluggedIn: false,
  hvacActive: false, hvacMode: 'off',
  waterFlowRate: 0, totalWaterUsage: 0,
  showSolar: false, showGrid: false,
  showTesla: false, showHVAC: false, showWater: false,
  solarToHouse: 0, solarToGrid: 0, gridToHouse: 0,
  gridColor: '#3B82F6', gridLabel: 'Balanced',
  hvacColor: '#9CA3AF'
};

let hasData = false;
let isCastDevice = false;

function log(msg) {
  console.log('[Receiver] ' + msg);
  const el = document.getElementById('debug');
  if (el) el.textContent = msg;
}

function setStatus(text) {
  const el = document.getElementById('statusText');
  if (el) el.textContent = text;
}

// ---- Cast Receiver Setup ----
try {
  if (typeof cast !== 'undefined' && cast.framework) {
    isCastDevice = true;
    log('Cast SDK found — setting up receiver');
    setStatus('Waiting for energy data...');

    const castContext = cast.framework.CastReceiverContext.getInstance();

    // Register custom namespace BEFORE starting
    const nsOptions = {};
    nsOptions[NAMESPACE] = cast.framework.system.MessageType.JSON;

    castContext.addCustomMessageListener(NAMESPACE, function(event) {
      try {
        const msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        Object.assign(data, msg);
        hasData = true;
        document.getElementById('status').style.display = 'none';
        log('Got data: solar=' + msg.solarPower + ' home=' + msg.homePower + ' grid=' + msg.gridPower);
      } catch (e) {
        log('Bad message: ' + e);
      }
    });

    // Start receiver with options
    const options = new cast.framework.CastReceiverOptions();
    options.maxInactivity = 3600;
    options.disableIdleTimeout = true;
    options.customNamespaces = nsOptions;

    castContext.start(options);
    log('Receiver started');
  } else {
    throw new Error('Cast SDK not available');
  }
} catch (e) {
  log('Not on Cast device — loading demo mode. ' + e.message);
  setStatus('Demo Mode (not on Cast device)');

  // Demo data for browser preview
  setTimeout(function() {
    data = {
      solarPower: 4200, homePower: 2500, gridPower: -1700,
      teslaPower: 0, hvacPower: 1100,
      teslaCharging: false, teslaPluggedIn: false,
      hvacActive: true, hvacMode: 'cooling',
      waterFlowRate: 0, totalWaterUsage: 3917,
      showSolar: true, showGrid: true,
      showTesla: false, showHVAC: true, showWater: false,
      solarToHouse: 2500, solarToGrid: 1700, gridToHouse: 0,
      gridColor: '#22C55E', gridLabel: 'Exporting',
      hvacColor: '#06B6D4'
    };
    hasData = true;
    document.getElementById('status').style.display = 'none';
  }, 500);
}

// ---- Rendering ----

function formatPower(w) {
  const a = Math.abs(w);
  if (a >= 1000) return (a / 1000).toFixed(1) + ' kW';
  return Math.round(a) + ' W';
}

function formatWater(g) {
  if (g >= 1000) return (g / 1000).toFixed(1) + ' kgal';
  return Math.round(g) + ' gal';
}

function getLayout() {
  const scale = Math.min(W / 1280, H / 720, 1);
  const marginX = Math.max(70 * scale, W * 0.06);
  const marginTop = Math.max(110 * scale, H * 0.12);
  const marginBottom = Math.max(120 * scale, H * 0.14);

  const cx = W / 2;
  const cy = (H + marginTop - marginBottom) / 2;

  const peripherals = [];
  if (data.showSolar) peripherals.push('solar');
  if (data.showGrid)  peripherals.push('grid');
  if (data.showTesla) peripherals.push('tesla');
  if (data.showHVAC)  peripherals.push('hvac');
  if (data.showWater) peripherals.push('water');

  const count = peripherals.length;
  const maxRx = Math.max(80 * scale, (W / 2) - marginX);
  const maxRy = Math.max(70 * scale, Math.min(cy - marginTop, (H - marginBottom) - cy));
  const rx = Math.min(W * 0.26, 320 * scale, maxRx);
  const ry = Math.min(H * 0.25, 240 * scale, maxRy);
  const positions = {};

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  if (count > 0) {
    const step = (2 * Math.PI) / count;
    const start = -Math.PI / 2;
    peripherals.forEach(function(p, i) {
      const angle = start + step * i;
      const x = clamp(cx + rx * Math.cos(angle), marginX, W - marginX);
      const y = clamp(cy + ry * Math.sin(angle), marginTop, H - marginBottom);
      positions[p] = { x: x, y: y };
    });
  }

  return { cx: cx, cy: cy, positions: positions, scale: scale };
}

function drawFlowLine(fromPos, toPos, power, color, elapsed) {
  if (power <= 10) return;

  const speed = 20 + (Math.min(Math.max(power, 100), 10000) / 10000) * 60;
  const dashLen = 10, gapLen = 18;
  const phase = (elapsed * speed) % (dashLen + gapLen);

  const mx = (fromPos.x + toPos.x) / 2;
  const my = (fromPos.y + toPos.y) / 2;
  const dx = toPos.x - fromPos.x;
  const dy = toPos.y - fromPos.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return;
  const curv = 0.08;
  const cx2 = mx + (-dy / len) * len * curv;
  const cy2 = my + (dx / len) * len * curv;

  const lineW = 2.5 + (Math.min(Math.max(power, 0), 10000) / 10000) * 4;

  // Glow
  ctx.beginPath();
  ctx.moveTo(fromPos.x, fromPos.y);
  ctx.quadraticCurveTo(cx2, cy2, toPos.x, toPos.y);
  ctx.strokeStyle = color + '1A';
  ctx.lineWidth = lineW + 8;
  ctx.lineCap = 'round';
  ctx.setLineDash([]);
  ctx.stroke();

  // Animated dashes
  ctx.beginPath();
  ctx.moveTo(fromPos.x, fromPos.y);
  ctx.quadraticCurveTo(cx2, cy2, toPos.x, toPos.y);
  ctx.strokeStyle = color + 'A6';
  ctx.lineWidth = lineW;
  ctx.lineCap = 'round';
  ctx.setLineDash([dashLen, gapLen]);
  ctx.lineDashOffset = -phase;
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawNode(x, y, size, emoji, label, value, subtitle, color, active) {
  const r = size / 2;
  const labelSize = Math.max(10, size * 0.16);
  const valueSize = Math.max(12, size * 0.22);
  const subtitleSize = Math.max(9, size * 0.14);

  // Background circle
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fill();

  // Border
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = color + (active ? 'B3' : '40');
  ctx.lineWidth = Math.max(1.5, size * 0.03);
  ctx.stroke();

  // Emoji
  ctx.font = (size * 0.38).toFixed(1) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(emoji, x, y);

  // Label
  ctx.font = '600 ' + labelSize.toFixed(1) + 'px -apple-system, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText(label, x, y + r + size * 0.20);

  // Value
  if (value) {
    ctx.font = '700 ' + valueSize.toFixed(1) + 'px -apple-system, sans-serif';
    ctx.fillStyle = active ? color : 'rgba(255,255,255,0.5)';
    ctx.fillText(value, x, y + r + size * 0.43);
  }

  // Subtitle
  if (subtitle) {
    ctx.font = subtitleSize.toFixed(1) + 'px -apple-system, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(subtitle, x, y + r + size * 0.62);
  }
}

function drawHeader(scale) {
  const side = Math.max(24, 40 * scale);
  const top = Math.max(18, 30 * scale);
  const titleSize = Math.max(16, 22 * scale);
  const timeSize = Math.max(12, 16 * scale);

  ctx.font = '600 ' + titleSize.toFixed(1) + 'px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(34, 197, 94, 0.8)';
  ctx.fillText('\u25CF  Home Energy', side, top);

  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  ctx.font = timeSize.toFixed(1) + 'px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText(time, W - side, top + Math.max(2, 4 * scale));
}

function draw(timestamp) {
  ctx.clearRect(0, 0, W, H);

  if (!hasData) {
    requestAnimationFrame(draw);
    return;
  }

  const elapsed = (timestamp - startTime) / 1000;
  const layout = getLayout();
  var cx = layout.cx, cy = layout.cy, positions = layout.positions;
  var uiScale = layout.scale;
  var center = { x: cx, y: cy };

  // Flow lines
  if (data.showSolar && positions.solar && data.solarToHouse > 0)
    drawFlowLine(positions.solar, center, data.solarToHouse, '#EAB308', elapsed);
  if (data.showGrid && positions.grid && data.solarToGrid > 0)
    drawFlowLine(center, positions.grid, data.solarToGrid, '#22C55E', elapsed);
  if (data.showGrid && positions.grid && data.gridToHouse > 0)
    drawFlowLine(positions.grid, center, data.gridToHouse, '#3B82F6', elapsed);
  if (data.showTesla && positions.tesla && data.teslaCharging)
    drawFlowLine(center, positions.tesla, data.teslaPower, '#14B8A6', elapsed);
  if (data.showHVAC && positions.hvac)
    drawFlowLine(center, positions.hvac, data.hvacPower || 500, data.hvacColor, elapsed);
  if (data.showWater && positions.water) {
    var wp = Math.max(data.waterFlowRate * 10, 200);
    drawFlowLine(positions.water, center, wp, '#3B82F6', elapsed);
  }

  // Nodes
  var homeSize = 100 * uiScale;
  var nodeSize = 82 * uiScale;

  drawNode(cx, cy, homeSize, '\u{1F3E0}', 'HOME', formatPower(data.homePower), '', '#FFFFFF', true);

  if (data.showSolar && positions.solar) {
    drawNode(positions.solar.x, positions.solar.y, nodeSize,
      '\u2600\uFE0F', 'SOLAR', formatPower(data.solarPower), '',
      '#EAB308', data.solarPower > 0);
  }
  if (data.showGrid && positions.grid) {
    var sub = data.gridPower > 10 ? 'Importing' : (data.gridPower < -10 ? 'Exporting' : 'Balanced');
    drawNode(positions.grid.x, positions.grid.y, nodeSize,
      '\u26A1', 'GRID', formatPower(Math.abs(data.gridPower)), sub,
      data.gridColor, Math.abs(data.gridPower) > 10);
  }
  if (data.showTesla && positions.tesla) {
    drawNode(positions.tesla.x, positions.tesla.y, nodeSize,
      '\u{1F697}', 'TESLA',
      data.teslaCharging ? formatPower(data.teslaPower) : '',
      data.teslaCharging ? 'Charging' : 'Plugged In',
      '#14B8A6', data.teslaCharging);
  }
  if (data.showHVAC && positions.hvac) {
    var hvacIcon = data.hvacMode === 'heating' ? '\u{1F525}' : '\u2744\uFE0F';
    var ml = data.hvacMode.charAt(0).toUpperCase() + data.hvacMode.slice(1);
    drawNode(positions.hvac.x, positions.hvac.y, nodeSize,
      hvacIcon, 'HVAC', formatPower(data.hvacPower), ml,
      data.hvacColor, true);
  }
  if (data.showWater && positions.water) {
    drawNode(positions.water.x, positions.water.y, nodeSize,
      '\u{1F4A7}', 'WATER',
      Math.round(data.waterFlowRate) + ' gal',
      data.totalWaterUsage > 0 ? formatWater(data.totalWaterUsage) + ' total' : '',
      '#3B82F6', data.waterFlowRate > 0);
  }

  drawHeader(uiScale);
  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
